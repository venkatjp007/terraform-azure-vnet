name: Terraform CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write        # required for Azure OIDC login
  pull-requests: write   # required to post the plan as a PR comment

env:
  TF_VERSION: "1.9.5"

jobs:
  # ---------------------------------------------------------------------------
  # Validate: format, lint, security scan, and module tests. No cloud creds.
  # ---------------------------------------------------------------------------
  validate:
    name: Validate & Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: Terraform validate (modules & envs)
        run: |
          for dir in modules/vnet modules/stack environments/dev environments/prod; do
            echo "::group::validate $dir"
            terraform -chdir="$dir" init -backend=false
            terraform -chdir="$dir" validate
            echo "::endgroup::"
          done

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: TFLint
        run: |
          tflint --init
          tflint --recursive --config="$(pwd)/.tflint.hcl"

      - name: tfsec (security scan)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: false

      - name: Terraform module tests
        run: terraform -chdir=modules/vnet test

  # ---------------------------------------------------------------------------
  # Plan: runs against Azure (OIDC). Posts plan output to the PR.
  # ---------------------------------------------------------------------------
  plan:
    name: Plan (${{ matrix.environment }})
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, prod]
    defaults:
      run:
        working-directory: environments/${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TFSTATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_SA }}" \
            -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}" \
            -backend-config="key=${{ matrix.environment }}.terraform.tfstate"

      - name: Terraform Plan
        run: terraform plan -var-file="${{ matrix.environment }}.tfvars" -out=tfplan -no-color | tee plan-${{ matrix.environment }}.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: plan-${{ matrix.environment }}
          path: environments/${{ matrix.environment }}/plan-${{ matrix.environment }}.txt

  # ---------------------------------------------------------------------------
  # Apply: only on main, gated behind a protected environment for approval.
  # ---------------------------------------------------------------------------
  apply:
    name: Apply (${{ matrix.environment }})
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, prod]
    environment: ${{ matrix.environment }}   # GitHub Environment = manual approval gate
    defaults:
      run:
        working-directory: environments/${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TFSTATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_SA }}" \
            -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}" \
            -backend-config="key=${{ matrix.environment }}.terraform.tfstate"

      - name: Terraform Apply
        run: terraform apply -var-file="${{ matrix.environment }}.tfvars" -auto-approve
